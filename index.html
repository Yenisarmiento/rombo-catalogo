<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rombo Incentivos</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #17305b;
      --muted: #64748b;
      --primary: #002b7f;
      --primary-2: #3b82f6;
      --border: #d9e5f7;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 14px 40px rgba(14, 30, 77, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 100%);
      color: var(--text);
      padding: 28px;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      color: white;
      border-radius: 28px;
      padding: 34px 38px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 42px;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      opacity: 0.95;
      max-width: 760px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .box {
      background: var(--card);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .sidebar {
      position: sticky;
      top: 20px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }

    .section-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .mini-label {
      display: block;
      margin: 16px 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    button, input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 13px 14px;
      font-size: 15px;
    }

    input {
      background: #fff;
      color: var(--text);
      outline-color: var(--primary-2);
    }

    button {
      border: none;
      background: linear-gradient(135deg, #002b7f 0%, #0f4ed8 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin-top: 14px;
      box-shadow: 0 10px 22px rgba(0, 43, 127, 0.18);
    }

    #resultado {
      display: none;
      margin-top: 18px;
      background: linear-gradient(180deg, #f7faff 0%, #eff5ff 100%);
      border: 1px solid #d6e5ff;
      border-radius: 20px;
      padding: 18px;
    }

    .result-name {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .result-points {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #e7f7ee;
      color: var(--success);
      font-weight: 700;
      margin: 12px 0 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(20, 48, 91, 0.06);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: #eef3fb;
      padding: 12px;
    }

    .card-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .status {
      margin-top: auto;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      display: inline-block;
      font-weight: 700;
    }

    .ok { background: #e6fff2; color: var(--success); }
    .no { background: #fff0f0; color: var(--danger); }

    .empty {
      background: #fbfdff;
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <h1>Plan de Incentivos Rombo</h1>
    <p>Consulta tus puntos ingresando tu número de cédula.</p>
  </section>

  <div class="layout">
    <aside class="box sidebar">
      <h2 class="section-title">Consulta</h2>
      <p id="estadoCarga">Cargando base de datos...</p>

      <label for="cedulaInput" class="mini-label">Número de Cédula</label>
      <input type="text" id="cedulaInput" placeholder="Ej: 12345678">

      <button id="btnConsultar" type="button">Consultar puntos</button>

      <div id="resultado"></div>
    </aside>

    <section class="box">
      <div id="productos" class="products"></div>
    </section>
  </div>
</div>

<script>
  let asesores = [];
  let asesorActual = null;
  let productos = [];

  const ARCHIVO_ASESORES = 'Base Liquidacion Puntos Cohorte1_Comercial.xlsx';
  const ARCHIVO_CATALOGO = 'Inventario de productos Catalogo.xlsx';

  function normalizarTexto(v) {
    return String(v || '').trim();
  }

  function format(valor) {
    return new Intl.NumberFormat('es-CO').format(Number(valor || 0));
  }

  // IMPORTANTE: Esta función ahora guarda la cédula correctamente
  function agruparAsesores(rows) {
    const mapa = new Map();

    rows.forEach((row) => {
      // Intentamos leer la cédula de cualquier columna posible
      const cedula = normalizarTexto(row.Cedula || row.cedula || row.CC || row.Documento || row.DOCUMENTO || row.id);
      const nombre = normalizarTexto(row.Asesor || row.asesor || row.NOMBRE_ASESOR);

      if (!cedula) return;

      const puntos = Math.round(Number(row.PUNTOS || row.puntos || 0));

      if (!mapa.has(cedula)) {
        mapa.set(cedula, {
          cedula: cedula,
          nombre: nombre,
          lider: row.Lider || row.lider || '',
          area: row.Area || row['Área'] || row.area || '',
          cohorte: row.Cohorte || row.cohorte || '',
          puntos: 0,
          registros: 0
        });
      }

      const actual = mapa.get(cedula);
      actual.puntos += isNaN(puntos) ? 0 : puntos;
      actual.registros += 1;
    });

    asesores = Array.from(mapa.values());
    console.log("Asesores cargados:", asesores.length); // Para depuración
  }

  // Lógica del catálogo (se mantiene igual)
  function cargarCatalogo(rows) {
    productos = rows.map(row => ({
      area: normalizarTexto(row.Area || row.area),
      nombre: normalizarTexto(row.Porducto || row.Producto || row.producto),
      puntos: Math.round(Number(row['Puntos Requeridos'] || row.Puntos || 0)),
      img: row["nombre del producto"] ? "Img/" + String(row["nombre del producto"]).trim() : 'Img/producto-base.jpg'
    })).filter(p => p.nombre && p.puntos > 0);
  }

  function renderProductos() {
    const cont = document.getElementById('productos');
    const areaAsesor = asesorActual ? asesorActual.area.toUpperCase() : '';
    
    let filtrados = productos;
    if (areaAsesor) {
      filtrados = productos.filter(p => p.area.toUpperCase() === areaAsesor);
    }

    if (!filtrados.length) {
      cont.innerHTML = '<div class="empty">No hay productos para mostrar.</div>';
      return;
    }

    cont.innerHTML = filtrados.map(p => `
      <div class="card">
        <img src="${p.img}" onerror="this.src='Img/producto-base.jpg'">
        <div class="card-body">
          <h3>${p.nombre}</h3>
          <div class="points">${format(p.puntos)} pts</div>
          ${asesorActual ? (asesorActual.puntos >= p.puntos ? '<span class="status ok">✅ Disponible</span>' : '<span class="status no">Faltan pts</span>') : ''}
        </div>
      </div>
    `).join('');
  }

  // FUNCIÓN DE BÚSQUEDA CORREGIDA
  function buscar() {
    const valorBusqueda = normalizarTexto(document.getElementById('cedulaInput').value);
    const box = document.getElementById('resultado');

    if (!valorBusqueda) {
      alert("Por favor ingresa una cédula");
      return;
    }

    // Buscamos coincidencia exacta en el array de asesores
    asesorActual = asesores.find(a => a.cedula === valorBusqueda);

    if (asesorActual) {
      box.style.display = 'block';
      box.innerHTML = `
        <div class="result-name">${asesorActual.nombre}</div>
        <div class="result-points">Puntos: ${format(asesorActual.puntos)}</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Área</div><div class="stat-value">${asesorActual.area}</div></div>
          <div class="stat-card"><div class="stat-label">Líder</div><div class="stat-value">${asesorActual.lider}</div></div>
        </div>
      `;
    } else {
      asesorActual = null;
      box.style.display = 'block';
      box.innerHTML = '<div class="empty" style="color:red">Cédula no encontrada en la base de datos.</div>';
    }
    renderProductos();
  }

  async function cargarArchivoExcel(ruta) {
    const response = await fetch(ruta);
    const data = await response.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
  }

  async function cargarDatosIniciales() {
    const estado = document.getElementById('estadoCarga');
    try {
      const rowsA = await cargarArchivoExcel(ARCHIVO_ASESORES);
      agruparAsesores(rowsA);
      const rowsC = await cargarArchivoExcel(ARCHIVO_CATALOGO);
      cargarCatalogo(rowsC);
      estado.textContent = '✅ Base de datos lista';
    } catch (e) {
      estado.textContent = '❌ Error al cargar archivos';
    }
  }

  document.getElementById('btnConsultar').addEventListener('click', buscar);
  cargarDatosIniciales();
</script>
</body>
</html>
